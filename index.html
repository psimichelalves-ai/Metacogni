<!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MetaCog</title>

<link rel="manifest" href="manifest.json">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { 
  --fontSize: 18px;
  --bg-dark: #070710;
  --neon-blue: #00eaff;
  --neon-pink: #ff2fd1;
  --neon-orange: #ff7a41;
  --glass: rgba(255,255,255,0.05);
}

body {
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: var(--fontSize);
  background: radial-gradient(circle at top, #0a0a1a, #000);
  color:#e6faff;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:80px;
  min-height:100vh;
  overflow-y:auto;
}

/* 🔷 TOPBAR MODERNA */
.topbar {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;

  display:flex;
  align-items:center;
  
  gap:10px;

  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);

  border-bottom:1px solid rgba(255,255,255,0.1);

  z-index:999;
}

/* logo */
.logo {
  height:100%;
  
}

/* título */
.app-title {
  font-size:20px;
  font-weight:bold;
  letter-spacing:1px;

  background: linear-gradient(90deg, #00eaff, #ff2fd1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.container {
  width:100%;
  max-width:420px;
  text-align:center;
  padding:20px 10px;
}

/* botão fechar */
.close-btn {
  position:absolute;
  right:15px;

  width:35px;
  height:35px;

  border:none;
  border-radius:50%;

  background: rgba(255,255,255,0.1);
  color:white;
  font-size:18px;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  transition:.3s;
}

.close-btn:hover {
  background:#ff2fd1;
  box-shadow:0 0 10px #ff2fd1;
}

/* 🔷 CARD MODERNO */
.card {
  width:70%;
  max-width:300px;
  margin:auto;

  aspect-ratio: 7 / 10; /* 🔥 PROPORÇÃO DA CARTA */

  padding:20px;
  border-radius:20px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);

  border:1px solid rgba(255,255,255,0.15);

  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;

  transition:.3s;
}

/* efeito glow ao passar */
.card:hover {
  transform: scale(1.02);
}

/* cores por etapa */
.planejamento { border: 2.5px solid #745bff; box-shadow: 0 0 20px #745bff; background: #eff2fd;}
.monitoramento { border: 2.5px solid #fa62cc; box-shadow: 0 0 20px #fa62cc; background: #eff2fd;}
.avaliacao { border: 2.5px solid var(--neon-orange); box-shadow: 0 0 20px #ff7a41; background: #eff2fd;}
    
.reflexao { border:2.5px solid #00ff9c; box-shadow:0 0 20px #00ff9c; }
.estude { border:2.5px solid #00ff9c; box-shadow:0 0 20px #00ff9c; }
.feedback { border:2.5px solid #00ff9c; box-shadow:0 0 20px #00ff9c; }

.card h2 {
  margin:0;
  font-weight:600;
  letter-spacing:1px;
}

.card.planejamento h2 {color: #745bff;}
.card.planejamento p {color: #030011; font-size: 1.8em;}
.card.monitoramento h2 {color: #fa62cc;}
.card.monitoramento p {color: #030011; font-size: 1.8em;}
.card.avaliacao h2 {color: #ff7a41;}
.card.avaliacao p {color: #030011; font-size: 1.8em;}

.reflexao p {font-size: 1.8em;}
.feedback p {font-size: 1.1em;}

.card p {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  margin:10px 0;
}

/* 🔘 BOTÕES */
button {
  width:81%;
  padding:14px;
  margin:10px auto;
  display:block;
  border:none;
  border-radius:12px;

  font-weight:bold;
  font-size:inherit;

  color:white;
  background: linear-gradient(45deg, #00eaff, #0077ff);

  box-shadow: 0 0 10px #00eaff;
  transition:.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00eaff;
}

/* 🔘 SWITCH */
.switch-container {
  width:75%;
  margin:12px auto;
  display:flex;
  justify-content:space-between;
  align-items:center;

  background: var(--glass);
  border-radius:12px;
  padding:10px;

  border:1px solid rgba(255,255,255,0.1);
}

/* 🔁 TOGGLE */
.switch {
  position: relative;
  width: 50px;
  height: 26px;
}

.switch input { opacity: 0; }

.slider {
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background:#333;
  border-radius:34px;
}

.slider:before {
  content:"";
  position:absolute;
  height:18px;
  width:18px;
  left:4px;
  bottom:4px;
  background:white;
  border-radius:50%;
  transition:.3s;
}

input:checked + .slider {
  background:#00eaff;
}

input:checked + .slider:before {
  transform:translateX(24px);
}

/* 📊 PROGRESS BAR */
.progress {
  width:85%;
  height:6px;
  background:#222;
  margin:15px auto;
  border-radius:5px;
}

.bar {
  height:100%;
  width:0%;
  background: linear-gradient(90deg, #00eaff, #00ff9c);
  box-shadow:0 0 10px #00eaff;
}

/* 📘 INSTRUÇÕES */
.info-card {
  width:85%;
  margin:10px auto;
  padding:20px;
  border-radius:15px;

  background: var(--glass);
  backdrop-filter: blur(10px);

  border:1px solid var(--neon-blue);
  box-shadow:0 0 10px var(--neon-blue);

  display:none;
  text-align:justify;
  color:#e6faff;
}

.info-card h3 {
  text-align:center;
}

/* QR */
#reader {
  width:300px;
  margin:10px auto;
  border-radius:10px;
  overflow:hidden;
}
</style>
</head>

<body>

<div class="topbar">
  <img src="logobarra.png" alt="MetaCog" class="logo">
  <button class="close-btn" onclick="fecharApp()">✖</button>
</div>

<div class="container">
  <div id="app"></div>
</div>

<!-- VLibras -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>

// ---------------- ESTADO ----------------

let estado = "inicio";

let tempoTotal = parseInt(localStorage.getItem("tempo")) || (5 * 60000);
let vozAtiva = localStorage.getItem("voz") === "true";

// ✅ NFC
let nfcAtivo = localStorage.getItem("nfc") === "true";
let nfcController = null;

let tempoAtual = 0;
let intervalo;

let score = { monitoramento:"", avaliacao:"" };
let podeIniciarTimer = false;

let mostrarInstrucoes = false;

// ---------------- CARTAS -----------------
const FRASES = {
  // 🟦 PLANEJAMENTO
  PLANEJ01: "Qual é o objetivo deste conteúdo que vou estudar?",
  PLANEJ02: "O que preciso compreender para considerar que aprendi?",
  PLANEJ03: "Como posso verificar se realmente compreendi esse conteúdo?",
  PLANEJ04: "O que eu já sei que pode me ajudar nesse estudo?",
  PLANEJ05: "Este conteúdo está claro para mim ou ainda está confuso?",
  PLANEJ06: "Esse conteúdo exige mais memorização ou compreensão?",
  PLANEJ07: "Qual parte desse conteúdo parece mais difícil?",
  PLANEJ08: "Em qual aspecto preciso prestar mais atenção?",
  PLANEJ09: "Estou focado em compreender ou apenas em concluir a tarefa?",
  PLANEJ10: "O que pode dificultar minha aprendizagem neste conteúdo?",
  PLANEJ11: "Qual parte devo compreender primeiro?",
  PLANEJ12: "Tenho clareza do que significa 'entender' esse conteúdo?",
  PLANEJ13: "Que estratégia de estudo vou utilizar (resumo, prática, explicação)?",
  PLANEJ14: "Quanto tempo preciso dedicar para atingir esse objetivo?",
  PLANEJ15: "Como saberei que atingi o objetivo de aprendizagem?",

  // 🟨 MONITORAMENTO
  MONITO01: "Estou avançando na compreensão deste conteúdo?",
  MONITO02: "O que já consegui compreender até agora?",
  MONITO03: "O que ainda não está claro para mim?",
  MONITO04: "Estou realmente entendendo ou apenas lendo?",
  MONITO05: "Consigo explicar o que acabei de estudar?",
  MONITO06: "Em qual parte estou com mais dificuldade?",
  MONITO07: "Estou percebendo quando não entendo?",
  MONITO08: "Minha compreensão está melhorando ao longo do estudo?",
  MONITO09: "Estou acompanhando meu próprio raciocínio?",
  MONITO10: "Estou focado nas partes mais importantes do conteúdo?",
  MONITO11: "O que estou fazendo agora está me ajudando a aprender?",
  MONITO12: "Estou confuso em algum ponto essencial?",
  MONITO13: "Consigo identificar onde estou errando?",
  MONITO14: "Estou ignorando alguma dificuldade?",
  MONITO15: "O que ainda falta para eu compreender melhor esse conteúdo?",

  // 🟩 AVALIAÇÃO
  AVALIA01: "Alcancei o objetivo deste estudo?",
  AVALIA02: "O que eu realmente compreendi?",
  AVALIA03: "O que ainda não compreendi adequadamente?",
  AVALIA04: "Consigo explicar esse conteúdo com clareza?",
  AVALIA05: "Minha compreensão é suficiente ou ainda é parcial?",
  AVALIA06: "Minha percepção de aprendizagem foi correta?",
  AVALIA07: "Achei que sabia algo que, na verdade, não sabia?",
  AVALIA08: "Onde estão minhas principais dificuldades?",
  AVALIA09: "Meu entendimento está organizado ou fragmentado?",
  AVALIA10: "Consigo aplicar esse conteúdo em outra situação?",
  AVALIA11: "O objetivo foi atingido totalmente ou parcialmente?",
  AVALIA12: "O que faltou para compreender completamente?",
  AVALIA13: "Se eu tivesse que estudar novamente, o que faria diferente?",
  AVALIA14: "Qual estratégia funcionou melhor para minha aprendizagem?",
  AVALIA15: "O que preciso fazer para melhorar na próxima vez?"
};

// ---------------- VLibras ----------------

new window.VLibras.Widget('https://vlibras.gov.br/app');

// ---------------- VOZ ----------------

function falar(txt){
  if(!vozAtiva) return;
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(txt));
}

// ---------------- FEEDBACK METACOGNITIVO ----------------

function gerarFeedbackCompleto(){

  // ✔ + ✔ 🧠
  if(score.monitoramento==="ok" && score.avaliacao==="sim"){
    return {
      titulo: "Alta acurácia metacognitiva" +". "+ "(precisão do julgamento)",
      interpretacao: "Seu julgamento sobre o estudo foi coerente com o resultado.",
      significado: "Você demonstrou alta acurácia metacognitiva, avaliando corretamente sua própria aprendizagem.",
      direcionamento: "Continue utilizando essa estratégia. Tente agora aprofundar o nível de compreensão do conteúdo."
    };
  }

  // ✔ + ❌ ⚠️
  if(score.monitoramento==="ok" && score.avaliacao==="nao"){
    return {
      titulo: "Baixa acurácia metacognitiva" +". "+ "(superestimação)",
      interpretacao: "Você acreditou que havia compreendido, mas o objetivo não foi atingido.",
      significado: "Há um viés otimista, indicando dificuldade em perceber os limites da própria compreensão.",
      direcionamento: "Reveja o conteúdo com mais atenção e busque evidências concretas de aprendizagem."
    };
  }

  // ⚠️ + ✔ 🧠
  if(score.monitoramento==="parcial" && score.avaliacao==="sim"){
    return {
      titulo: "Acurácia metacognitiva moderada" +". "+ "(precisão parcial)",
      interpretacao: "Você teve dúvidas durante o estudo, mas conseguiu atingir o objetivo.",
      significado: "Você apresenta acurácia metacognitiva em desenvolvimento, reconhecendo parcialmente seu desempenho.",
      direcionamento: "Continue praticando. Tente identificar com mais precisão quando realmente compreende o conteúdo."
    };
  }

  // ⚠️ + ❌ 🧠
  if(score.monitoramento==="parcial" && score.avaliacao==="nao"){
    return {
      titulo: "Acurácia metacognitiva moderada" +". "+ "(baixa precisão)",
      interpretacao: "Você percebeu parcialmente as dificuldades, e o objetivo não foi atingido.",
      significado: "Há indícios de monitoramento metacognitivo, mas ainda com baixa precisão na avaliação.",
      direcionamento: "Aprofunde sua análise durante o estudo. Tente identificar exatamente onde está a dificuldade."
    };
  }

  // ❌ + ✔ ⚠️
  if(score.monitoramento==="ruim" && score.avaliacao==="sim"){
    return {
      titulo: "Baixa acurácia metacognitiva" +". "+ "(subestimação)",
      interpretacao: "Você acreditou que não havia compreendido, mas conseguiu atingir o objetivo.",
      significado: "Há um viés pessimista, indicando insegurança sobre a própria aprendizagem.",
      direcionamento: "Confie mais no seu processo. Procure reconhecer os sinais de que você está aprendendo."
    };
  }

  // ❌ + ❌ 🔍
  if(score.monitoramento==="ruim" && score.avaliacao==="nao"){
    return {
      titulo: "Consciência da dificuldade" +". "+ "(acurácia metacognitiva adequada)",
      interpretacao: "Você identificou corretamente que não atingiu o objetivo.",
      significado: "Você demonstrou consciência da dificuldade, que é essencial para o desenvolvimento metacognitivo.",
      direcionamento: "Ajuste sua estratégia de estudo (tempo, método ou foco) antes de tentar novamente."
    };
  }

  // fallback 🧠
  return {
    titulo: "Reflexão geral",
    interpretacao: "Continue refletindo sobre seu processo de aprendizagem.",
    significado: "A metacognição envolve observar, avaliar e ajustar sua forma de aprender.",
    direcionamento: "Retorne ao conteúdo e tente aplicar uma estratégia diferente."
  };
}

//--------------mostrarInstrucoes-----------
function toggleInstrucoes(){
  mostrarInstrucoes = !mostrarInstrucoes;
  render();
}

// ---------------- RENDER ----------------

function render(){

  // 🔐 valida uso
  if(!verificarValidade()){
    telaBloqueio();
    return;
  }

  // 🔽 garante que sempre inicia no topo
  //window.scrollTo(0,0);
  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });

  if(estado==="inicio"){
   app.innerHTML = `
    <h2>CONFIGURAÇÃO</h2>

    <div class="switch-container">
      <span>🔊 Leitura em Voz</span>
      <label class="switch">
        <input type="checkbox" ${vozAtiva ? "checked":""}
          onchange="toggleVoz(this.checked)">
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="switch-container">
      <span>📡 NFC automático</span>
      <label class="switch">
        <input type="checkbox" ${nfcAtivo ? "checked":""}
          onchange="toggleNFC(this.checked)">
        <span class="slider"></span>
      </label>
    </div>

    <div class="switch-container">
    <p>Fonte</p>
        <input type="range" min="14" max="28"
          value="${localStorage.getItem('fonte')||18}"
          onchange="setFonte(this.value)">
    </div>

    <div class="switch-container">
        <p>Tempo: <span id="tempoLabel">${tempoTotal/60000} min</span></p>
        <input type="range" min="0.1" max="20"
          value="${tempoTotal/60000}"
          onchange="setTempo(this.value)">
    </div>
    
    <button onclick="toggleInstrucoes()">
      ${mostrarInstrucoes ? "📖 Ocultar instruções" : "📖 Ver instruções"}
    </button>
    
    <!-- 📘 CARD COLAPSÁVEL -->
    <div class="info-card" style="display:${mostrarInstrucoes ? 'block':'none'}; text-align: justify;">
      <h3>Instruções de uso</h3>

      <p>
      Este recurso auxilia no desenvolvimento da consciência sobre os próprios processos de pensamento e aprendizagem, podendo ser utilizado de forma individual ou em acompanhamento com um profissional.
      <br><br>

      ⚙️ <strong>Configuração inicial e acessibilidade</strong><br>
      Antes de iniciar, configure o aplicativo de acordo com sua necessidade:<br>
      ⏱️ Tempo de estudo | 🔊 Leitura em voz | 🔤 Tamanho da fonte | 🤟 VLibras | 📶 NFC/QR Code: aproxime a carta ou escaneie para leitura automática
      <br><br>

      1️⃣ <strong>Planejamento</strong><br>
      Escolha uma carta roxa e identifique: Qual é o objetivo da atividade ou do conteúdo?
      <br><br>

      2️⃣ <strong>Monitoramento</strong><br>
      Durante a atividade, escolha uma carta rosa e observe seu processo de compreensão. Ao final, indique sua percepção:<br>
      ✔ Satisfatório | ⚠️ Parcial | ❌ Insatisfatório
      <br><br>

      3️⃣ <strong>Avaliação</strong><br>
      Escolha uma carta laranja e responda: O objetivo foi atingido?<br>
      ✔ Sim | ❌ Não
      <br><br>

      4️⃣ <strong>Reflexão (no aplicativo)</strong><br>
      O aplicativo apresentará uma pergunta reflexiva para análise do processo realizado.
      <br><br>

      5️⃣ <strong>Relatório Metacognitivo (no aplicativo)</strong><br>
      Ao final, o aplicativo gerará um feedback automático com base nas suas respostas:<br>
      🧠 Nível de acurácia metacognitiva (precisão do julgamento)<br>
      📊 Interpretação do seu processo de aprendizagem<br>
      🎯 Significado do seu padrão de resposta<br>
      🔁 Sugestões para melhorar sua estratégia
      <br><br>

      🎯 <strong>Finalidade</strong><br>
      Favorecer o desenvolvimento de habilidades metacognitivas, como:<br>
      Planejar | Monitorar | Avaliar | Ajuste de estratégias cognitivas
      <br><br>

      👨‍⚕️ <strong>Uso profissional</strong><br>
      Em contexto clínico ou psicopedagógico, o recurso pode auxiliar na:<br>
      Identificação de padrões metacognitivos<br>
      Análise da relação entre percepção e desempenho<br>
      Intervenção na autorregulação da aprendizagem
      <br><br>

      💡 <strong>Orientação</strong><br>
      As respostas não têm caráter avaliativo ou classificatório. O foco está na consciência do processo, favorecendo o desenvolvimento cognitivo e a autonomia do indivíduo.
      </p>
    </div>

    <button onclick="irPlanejamento()">➡️ Iniciar</button>
  `;

  falar("Metacog. Tela de configuração");
  
} else if(["planejamento","monitoramento","avaliacao","estude"].includes(estado)){
  telaCard();
}

else if(estado==="reflexao"){
  let p = gerarPergunta();

  app.innerHTML=`    
    <div class="card reflexao">
        <h2>REFLEXÃO</h2>
        <p>${p}</p>
    </div>
    <button onclick="irScore()">➡️ Continuar</button>
  `;

  falar(p);
}

else if(estado==="score"){

  let f = gerarFeedbackCompleto();

  app.innerHTML=`
    
    
    <div class="card feedback" style="display: block;">
    <h2>FEEDBACK METACOGNITIVO</h2>
    <h3>${f.titulo}</h3>

    <p><strong>Interpretação:</strong><br>${f.interpretacao}</p>

    <p><strong>Significado metacognitivo:</strong><br>${f.significado}</p>

    <p><strong>Direcionamento:</strong><br>${f.direcionamento}</p>
    </div>

    <button onclick="reiniciar()">🔁 Novo ciclo</button>
  `;

  falar(f.titulo + ". Interpretação:" + ". " + f.interpretacao + ". Significado metacognitivo:" + ". " + f.significado + ". Direcionamento:" + ". " + f.direcionamento);
}

}

// ---------------- RESTANTE DO FLUXO ----------------

function toggleVoz(valor){
  vozAtiva = valor;
  localStorage.setItem("voz", vozAtiva);
}

function toggleNFC(valor){
  nfcAtivo = valor;
  localStorage.setItem("nfc", nfcAtivo);
}

function setFonte(v){
  document.documentElement.style.setProperty('--fontSize', v+"px");
  localStorage.setItem("fonte", v);
}

function setTempo(v){
  // tempoTotal = v * 60000; //Descomentar essa linha e comentar a linha baixa quando implantar xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  tempoTotal = v * 60000;
  localStorage.setItem("tempo", tempoTotal);
  document.getElementById("tempoLabel").innerText = v+" min";
}

function irPlanejamento(){
  estado="planejamento";
  
  render();
  
  // 🔽 rola para o topo suavemente
  setTimeout(()=>{
    window.scrollTo({
      top: 0,
      behavior: "smooth"
    });
  }, 50);
}

function telaCard(){

  podeIniciarTimer = true;

  app.innerHTML=`
    
    

    ${estado==="estude" ? `
    
    
      <div class="progress">
        <div class="bar" id="barra"></div>
      </div>
      <div class="card ${estado}">
        ${estado==="avaliacao" ? `<h2>AVALIAÇÃO</h2>`:`<h2>${estado.toUpperCase()}</h2>`}
        <p id="msg" style="font-size: xx-large;">📚</p>
      </div>
    `:`
      <div class="card ${estado}">
      ${estado==="avaliacao" ? `<h2>AVALIAÇÃO</h2>`:`<h2>${estado.toUpperCase()}</h2>`}
        <p id="msg">Escolha uma carta...</p>
      </div>
      
      <button onclick="scanQR('${estado}')">📷 Ler QR</button>
      <div id="reader"></div>
        
    `}    

    ${estado==="monitoramento" ? `
      <button onclick="responder('ok'); proximo();">✔ Satisfatório</button>
      <button onclick="responder('parcial'); proximo();">⚠️ Parcial</button>
      <button onclick="responder('ruim'); proximo();">❌ Insatisfatório</button>
    `:""}

    ${estado==="avaliacao" ? `
      <button onclick="avaliar('sim'); proximo();">✔ Atingiu</button>
      <button onclick="avaliar('nao'); proximo();">❌ Não</button>
    `:""}
    
    ${estado==="planejamento" ? `
      <button onclick="proximo(); estudar();">➡️ Próximo</button>
    `:""}
    
  `;

  if(estado==="estude")
    falar("Estude."); 
  else
    falar("Escolha uma carta.");
    
  // ✅ ativa NFC automaticamente
  if((estado==="planejamento") || (estado==="monitoramento") || (estado==="avaliacao"))
    iniciarNFC();
  
}

function iniciarTimer(){
  tempoAtual=0;
  clearInterval(intervalo);

  intervalo=setInterval(()=>{
    tempoAtual+=100;
    let p=(tempoAtual/tempoTotal)*100;
    document.getElementById("barra").style.width=p+"%";

    if(tempoAtual>=tempoTotal){
      clearInterval(intervalo);
      proximo();
    }
  },100);
}

function responder(resp){
  score.monitoramento=resp;  
}

function avaliar(resp){
  score.avaliacao=resp;
}

function proximo(){
  if(estado==="planejamento") estado="estude";
  else if(estado==="estude") estado="monitoramento";
  else if(estado==="monitoramento") estado="avaliacao";
  else if(estado==="avaliacao") estado="reflexao";

  render();
  
  // 🔽 rola para o topo suavemente
  setTimeout(()=>{
    window.scrollTo({
      top: 0,
      behavior: "smooth"
    });
  }, 50);
}

// ---------------- QR ----------------

// 🔹 Detecta o grupo pelo prefixo do código
function obterGrupo(codigo) {
  if (codigo.startsWith("PLANEJ")) return "planejamento";
  if (codigo.startsWith("MONITO")) return "monitoramento";
  if (codigo.startsWith("AVALIA")) return "avaliacao";
  return null;
}

// 🔹 Busca a frase
function obterFrase(codigo) {
  return FRASES[codigo] || null;
}

// 🔹 Função principal com validação de estado
function scanQR(estadoAtual) {
  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      const codigo = decodedText.toUpperCase().trim();
      const grupo = obterGrupo(codigo);
      const frase = obterFrase(codigo);

      let mensagem;

      if (!grupo || !frase) {
        mensagem = "QR Code inválido.";
      } 
      else if (grupo !== estadoAtual.toLowerCase()) {
      
        if (estadoAtual == "avaliacao") {estadoAtual = "avaliação"};
        
        mensagem = `Atenção!️ Esta carta não pertence a etapa de ${estadoAtual.toUpperCase()}.`;
      } 
      else {
        mensagem = frase;
      }

      document.getElementById("msg").innerText = mensagem;
      falar(mensagem);

      html5QrCode.stop();
    }
  );
}

// ---------------- NFC ----------------

async function iniciarNFC(){

  if(!nfcAtivo || !('NDEFReader' in window)) return;

  try {

    if(nfcController) nfcController.abort();

    nfcController = new AbortController();
    const ndef = new NDEFReader();

    await ndef.scan({ signal: nfcController.signal });

    ndef.onreading = event => {

      let texto = "";

      for (const record of event.message.records) {
        texto = new TextDecoder().decode(record.data);
      }

      const codigo = texto.toUpperCase().trim();
      const grupo = obterGrupo(codigo);
      const frase = obterFrase(codigo);

      let mensagem;

      if (!grupo || !frase) {
        mensagem = "NFC inválido.";
      } 
      else if (grupo !== estado.toLowerCase()) {
        mensagem = `Atenção! Esta carta não pertence a etapa de ${estado.toUpperCase()}.`;
      } 
      else {
        mensagem = frase;
      }

      const el = document.getElementById("msg");
      if(el) el.innerText = mensagem;

      // Vibração
      if(navigator.vibrate) navigator.vibrate(200);

      // Feedback visual leve (não quebra layout)
      const card = document.querySelector(".card");
      if(card){
        card.style.boxShadow = "0 0 15px #00c853";
        setTimeout(()=> card.style.boxShadow = "none", 500);
      }

      falar(mensagem);
    };

  } catch (err) {
    console.log("Erro NFC:", err);
  }
}

function fecharApp(){

  // 🧠 Detecta se está em modo app (PWA instalado)
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

  // 🔒 Tenta fechar direto (funciona melhor em PWA)
  window.close();

  // ⛔ Evita tela branca: só usa fallback se houver histórico
  if(!isStandalone && window.history.length > 1){
    setTimeout(()=>{
      window.history.back();
    }, 100);
  }
}

function verificarValidade(){

  const hoje = new Date();
  const hojeStr = hoje.toISOString().split("T")[0]; // YYYY-MM-DD

  // 🔒 DATA LIMITE (24/04/2026)  
  const dataLimite = new Date("2026-04-24T21:59:59");

  // ⛔ bloqueio por data fixa
  if(hoje > dataLimite){
    return false;
  }

  const dataSalva = localStorage.getItem("dataInstalacao");

  // primeira vez
  if(!dataSalva){
    localStorage.setItem("dataInstalacao", hojeStr);
    return true;
  }

  // mesmo dia
  if(dataSalva === hojeStr){
    return true;
  }

  // expirou
  return false;
}
