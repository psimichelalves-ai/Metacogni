<!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baralho Metacognitivo</title>

<link rel="manifest" href="manifest.json">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --fontSize: 18px; }

body {
  margin:0;
  font-family: Arial;
  font-size: var(--fontSize);
  background:#1e3c72;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container { width:100%; max-width:420px; text-align:center; }

.card {
  width:80%;
  margin:auto;
  padding:30px;
  border-radius:20px;
  min-height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

button {
  width:80%;
  padding:15px;
  margin:10px auto;
  display:block;
  border:none;
  border-radius:10px;
  font-weight:bold;
  color:#1e3c72;
}

/* SWITCH */
.switch-container {
  width:80%;
  margin:15px auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#ffffff22;
  padding:12px;
  border-radius:12px;
}

.switch {
  position: relative;
  width: 50px;
  height: 26px;
}

.switch input {
  opacity: 0;
}

.slider {
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background:#ccc;
  border-radius:34px;
}

.slider:before {
  content:"";
  position:absolute;
  height:18px;
  width:18px;
  left:4px;
  bottom:4px;
  background:white;
  border-radius:50%;
  transition:.3s;
}

input:checked + .slider {
  background:#00c853;
}

input:checked + .slider:before {
  transform:translateX(24px);
}

/* CORES */
.planejamento { background:#4A90E2; }
.monitoramento { background:#F5A623; }
.avaliacao { background:#7ED321; }
.reflexao { background:#8E44AD; }

.progress {
  width:80%;
  height:6px;
  background:#ccc;
  margin:10px auto;
  border-radius:5px;
}

.bar { height:100%; width:0%; background:white; }

#reader { width:300px; margin:10px auto; }
</style>
</head>

<body>

<div class="container">
  <div id="app"></div>
</div>

<!-- VLibras padrão -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>

// ---------------- ESTADO ----------------

let estado = "inicio";

let tempoTotal = parseInt(localStorage.getItem("tempo")) || (5 * 60000);
let vozAtiva = localStorage.getItem("voz") === "true";

let cameraSelecionada = localStorage.getItem("camera") || "";
let camerasDisponiveis = [];

let tempoAtual = 0;
let intervalo;

let score = { monitoramento:"", avaliacao:"" };
let podeIniciarTimer = false;

// ---------------- VLibras ----------------

new window.VLibras.Widget('https://vlibras.gov.br/app');

// ---------------- VOZ ----------------

function falar(txt){
  if(!vozAtiva) return;
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(txt));
}

// ---------------- CAMERAS ----------------

async function carregarCameras(){
  try{
    camerasDisponiveis = await Html5Qrcode.getCameras();

    if(!cameraSelecionada && camerasDisponiveis.length){
      cameraSelecionada = camerasDisponiveis[0].id;
      localStorage.setItem("camera", cameraSelecionada);
    }
  }catch(e){
    console.log("Erro câmera", e);
  }
}

function selecionarCamera(id){
  cameraSelecionada = id;
  localStorage.setItem("camera", id);
}

// ---------------- RENDER ----------------

function render(){

if(estado==="inicio"){
  app.innerHTML = `
    <h2>⚙️ Configuração</h2>

    <div class="switch-container">
      <span>🔊 Leitura em Voz</span>
      <label class="switch">
        <input type="checkbox" ${vozAtiva ? "checked":""}
          onchange="toggleVoz(this.checked)">
        <span class="slider"></span>
      </label>
    </div>

    <p>Fonte</p>
    <input type="range" min="14" max="28"
      value="${localStorage.getItem('fonte')||18}"
      onchange="setFonte(this.value)">

    <p>Tempo: <span id="tempoLabel">${tempoTotal/60000} min</span></p>
    <input type="range" min="1" max="20"
      value="${tempoTotal/60000}"
      onchange="setTempo(this.value)">

    <button class="planejamento" onclick="irPlanejamento()">Iniciar</button>
  `;

  falar("Tela de configuração");
}

else if(["planejamento","monitoramento","avaliacao"].includes(estado)){
  telaCard();
}

else if(estado==="reflexao"){
  let p = gerarPergunta();

  app.innerHTML=`
    <h2>🧠 Reflexão</h2>
    <div class="card reflexao">${p}</div>
    <button onclick="irScore()">Continuar</button>
  `;

  falar(p);
}

else if(estado==="score"){
  app.innerHTML=`
    <h2>🏆 Resultado</h2>
    <p>Monitoramento: ${score.monitoramento}</p>
    <p>Avaliação: ${score.avaliacao}</p>
    <button onclick="reiniciar()">Novo ciclo</button>
  `;
}

}

// ---------------- CONFIG ----------------

function toggleVoz(valor){
  vozAtiva = valor;
  localStorage.setItem("voz", vozAtiva);
}

// ---------------- AJUSTES ----------------

function setFonte(v){
  document.documentElement.style.setProperty('--fontSize', v+"px");
  localStorage.setItem("fonte", v);
}

function setTempo(v){
  tempoTotal = v * 60000;
  localStorage.setItem("tempo", tempoTotal);
  document.getElementById("tempoLabel").innerText = v+" min";
}

// ---------------- FLUXO ----------------

function irPlanejamento(){
  estado="planejamento";
  render();
}

// ---------------- CARD ----------------

function telaCard(){

  podeIniciarTimer = true;

  app.innerHTML=`
    <h2>${estado.toUpperCase()}</h2>

    <div class="progress">
      <div class="bar" id="barra"></div>
    </div>

    <div class="card ${estado}" onclick="iniciarCard()">
      <p id="msg">Clique após leitura da carta</p>
    </div>

    <select onchange="selecionarCamera(this.value)" style="width:80%; padding:10px; border-radius:10px;">
      ${camerasDisponiveis.map(cam => `
        <option value="${cam.id}" ${cam.id===cameraSelecionada ? "selected":""}>
          ${cam.label || "Câmera"}
        </option>
      `).join("")}
    </select>

    <button onclick="scanQR()">📷 Ler QR</button>
    <div id="reader"></div>

    ${estado==="monitoramento" ? `
      <button onclick="responder('ok')">✔ Satisfatório</button>
      <button onclick="responder('parcial')">⚠️ Parcial</button>
      <button onclick="responder('ruim')">❌ Insatisfatório</button>
    `:""}

    ${estado==="avaliacao" ? `
      <button onclick="avaliar('sim')">✔ Atingiu</button>
      <button onclick="avaliar('nao')">❌ Não</button>
    `:""}

    <button onclick="proximo()">➡️ Próximo</button>
  `;

  falar("Escolha uma carta");
}

// ---------------- RESTANTE DO FLUXO ----------------

function iniciarCard(){
  if(!podeIniciarTimer) return;
  document.getElementById("msg").innerText="Estudar...";
  iniciarTimer();
  podeIniciarTimer=false;
}

function iniciarTimer(){
  tempoAtual=0;
  clearInterval(intervalo);

  intervalo=setInterval(()=>{
    tempoAtual+=100;
    let p=(tempoAtual/tempoTotal)*100;
    document.getElementById("barra").style.width=p+"%";

    if(tempoAtual>=tempoTotal){
      clearInterval(intervalo);
    }
  },100);
}

function responder(resp){
  score.monitoramento=resp;
  iniciarTimer();
}

function avaliar(resp){
  score.avaliacao=resp;
}

function proximo(){
  clearInterval(intervalo);
  tempoAtual=0;
  let barra=document.getElementById("barra");
  if(barra) barra.style.width="0%";
  podeIniciarTimer=true;

  if(estado==="planejamento") estado="monitoramento";
  else if(estado==="monitoramento") estado="avaliacao";
  else if(estado==="avaliacao") estado="reflexao";

  render();
}

function gerarPergunta(){
  return score.avaliacao==="sim"
    ? "Sua compreensão é profunda?"
    : "O que você precisa melhorar?";
}

function irScore(){
  estado="score";
  render();
}

function reiniciar(){
  estado="inicio";
  score={monitoramento:"",avaliacao:""};
  render();
}

// ---------------- QR ----------------

function scanQR(){

  if(!cameraSelecionada){
    alert("Selecione uma câmera");
    return;
  }

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    cameraSelecionada,
    { fps:10, qrbox:250 },
    (decodedText)=>{
      document.getElementById("msg").innerText=decodedText;
      falar(decodedText);
      html5QrCode.stop();
    }
  );
}

// ---------------- SERVICE WORKER ----------------

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

// ---------------- START ----------------

carregarCameras().then(()=> render());

</script>

</body>
</html>
