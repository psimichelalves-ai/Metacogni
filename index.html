<!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MetaCog</title>

<link rel="manifest" href="manifest.json">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --fontSize: 18px; }

body {
  margin:0;
  font-family: Arial;
  font-size: var(--fontSize);
  background:#fdfdfd;
  color:#030011;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container { width:100%; max-width:420px; text-align:center; }

.card {
  width:70%;
  margin:auto;
  padding:30px;
  border-radius:20px;
  min-height:300px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
}

button {
  width:80%;
  padding:15px;
  margin:10px auto;
  display:block;
  border:none;
  border-radius:10px;
  font-weight:bold;
  color:white;
  background:#3287f2;
}

.switch-container {
  width:80%;
  margin:15px auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#ffffff22;
  padding:10px;
  border-radius:12px;
}

.switch {
  position: relative;
  width: 50px;
  height: 26px;
}

.switch input { opacity: 0; }

.slider {
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background:#ccc;
  border-radius:34px;
}

.slider:before {
  content:"";
  position:absolute;
  height:18px;
  width:18px;
  left:4px;
  bottom:4px;
  background:white;
  border-radius:50%;
  transition:.3s;
}

input:checked + .slider {
  background:#00c853;
}

input:checked + .slider:before {
  transform:translateX(24px);
}

/* CORES */
.planejamento { background:#3287f2; }
.estude { background:#7ED321; }
.monitoramento { background:#fa62cc; }
.avaliacao { background:#ff7a41; }
.reflexao { background:#7ED321; }

.progress {
  width:80%;
  height:6px;
  background:#ccc;
  margin:10px auto;
  border-radius:5px;
}

.bar { height:100%; width:0%; background:#7ED321; }

#reader { width:300px; margin:10px auto; }
</style>
</head>

<body>

<div class="container">
  <div id="app"></div>
</div>

<!-- VLibras -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>

// ---------------- ESTADO ----------------

let estado = "inicio";

let tempoTotal = parseInt(localStorage.getItem("tempo")) || (5 * 60000);
let vozAtiva = localStorage.getItem("voz") === "true";
let nfcAtivo = localStorage.getItem("nfc") === "true";

let tempoAtual = 0;
let intervalo;

let score = { monitoramento:"", avaliacao:"" };

// ---------------- VLibras ----------------
new window.VLibras.Widget('https://vlibras.gov.br/app');

// ---------------- VOZ ----------------
function falar(txt){
  if(!vozAtiva) return;
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(txt));
}

// ---------------- CONFIG ----------------

function toggleVoz(valor){
  vozAtiva = valor;
  localStorage.setItem("voz", vozAtiva);
}

function toggleNFC(valor){
  nfcAtivo = valor;
  localStorage.setItem("nfc", nfcAtivo);
}

// ---------------- NFC ----------------

async function iniciarNFC(estadoAtual){

  if(!nfcAtivo) return;

  if (!('NDEFReader' in window)) return;

  try{
    const ndef = new NDEFReader();
    await ndef.scan();

    ndef.onreading = (event) => {

      let decoder = new TextDecoder();

      for (const record of event.message.records) {

        let codigo = decoder.decode(record.data).toUpperCase().trim();

        const grupo = obterGrupo(codigo);
        const frase = obterFrase(codigo);

        let mensagem;

        if (!grupo || !frase) {
          mensagem = "Tag NFC inválida.";
        } 
        else if (grupo !== estadoAtual.toLowerCase()) {
          mensagem = `Carta incorreta para esta etapa.`;
        } 
        else {
          mensagem = frase;
        }

        document.getElementById("msg").innerText = mensagem;
        falar(mensagem);

        // 🔊 Vibração
        if(navigator.vibrate){
          navigator.vibrate(200);
        }

        // 🎯 Feedback visual
        let card = document.querySelector(".card");
        card.style.transform = "scale(1.05)";
        setTimeout(()=> card.style.transform = "scale(1)", 200);
      }

    };

  }catch(e){
    console.log("Erro NFC:", e);
  }
}

// ---------------- RENDER ----------------

function render(){

if(estado==="inicio"){
  app.innerHTML = `
    <h2>⚙️ CONFIGURAÇÃO</h2>

    <div class="switch-container">
      <span>🔊 Leitura em Voz</span>
      <label class="switch">
        <input type="checkbox" ${vozAtiva ? "checked":""}
          onchange="toggleVoz(this.checked)">
        <span class="slider"></span>
      </label>
    </div>

    <div class="switch-container">
      <span>📶 NFC automático</span>
      <label class="switch">
        <input type="checkbox" ${nfcAtivo ? "checked":""}
          onchange="toggleNFC(this.checked)">
        <span class="slider"></span>
      </label>
    </div>

    <div class="switch-container">
      <p>Tempo: <span id="tempoLabel">${tempoTotal/60000} min</span></p>
      <input type="range" min="1" max="20"
        value="${tempoTotal/60000}"
        onchange="setTempo(this.value)">
    </div>

    <button onclick="irPlanejamento()">➡️ Iniciar</button>
  `;
}

// ---------------- FLUXO ----------------

else if(["planejamento","monitoramento","avaliacao"].includes(estado)){
  telaCard();
}

}

// ---------------- CARD ----------------

function telaCard(){

  app.innerHTML=`
    <h2>${estado.toUpperCase()}</h2>

    <div class="card ${estado}">
      <p id="msg">Aproxime a carta...</p>
    </div>
  `;

  falar("Aproxime a carta");
  iniciarNFC(estado);
}

// ---------------- UTIL ----------------

function setTempo(v){
  tempoTotal = v * 60000;
  localStorage.setItem("tempo", tempoTotal);
}

function irPlanejamento(){
  estado="planejamento";
  render();
}

// ---------------- QR/NFC COMPARTILHADO ----------------

function obterGrupo(codigo) {
  if (codigo.startsWith("PLANEJ")) return "planejamento";
  if (codigo.startsWith("MONITO")) return "monitoramento";
  if (codigo.startsWith("AVALIA")) return "avaliacao";
  return null;
}

function obterFrase(codigo) {
  return codigo;
}

// ---------------- START ----------------

render();

</script>

</body>
</html>
