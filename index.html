<!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baralho Metacognitivo</title>

<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --fontSize: 18px; }

body {
  margin:0;
  font-family: Arial;
  font-size: var(--fontSize);
  background:#1e3c72;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container { width:100%; max-width:420px; text-align:center; }

.card {
  width:80%;
  margin:auto;
  padding:25px;
  border-radius:20px;
  min-height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:left;
}

button {
  width:80%;
  padding:15px;
  margin:10px auto;
  display:block;
  border:none;
  border-radius:10px;
  font-weight:bold;
  color:#1e3c72;
}

.switch-container {
  width:80%;
  margin:15px auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#ffffff22;
  padding:12px;
  border-radius:12px;
}

.switch { position:relative; width:50px; height:26px; }
.switch input { opacity:0; }

.slider {
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background:#ccc;
  border-radius:34px;
}

.slider:before {
  content:"";
  position:absolute;
  height:18px;
  width:18px;
  left:4px;
  bottom:4px;
  background:white;
  border-radius:50%;
  transition:.3s;
}

input:checked + .slider { background:#00c853; }
input:checked + .slider:before { transform:translateX(24px); }

.planejamento { background:#4A90E2; }
.monitoramento { background:#F5A623; }
.avaliacao { background:#7ED321; }
.reflexao { background:#8E44AD; }

.progress {
  width:80%;
  height:6px;
  background:#ccc;
  margin:10px auto;
  border-radius:5px;
}

.bar { height:100%; width:0%; background:white; }

#reader { width:300px; margin:10px auto; }

.feedback {
  width:90%;
  margin:auto;
  background:#ffffff22;
  padding:20px;
  border-radius:15px;
  text-align:left;
}
</style>
</head>

<body>

<div class="container">
  <div id="app"></div>
</div>

<script>

// ---------------- ESTADO ----------------

let estado="inicio";
let tempoTotal=parseInt(localStorage.getItem("tempo"))||(5*60000);
let vozAtiva=localStorage.getItem("voz")==="true";

let tempoAtual=0;
let intervalo;
let score={monitoramento:"",avaliacao:""};
let podeIniciarTimer=false;
let nfcReader=null;

// ---------------- VOZ ----------------

function falar(txt){
  if(!vozAtiva) return;
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(txt));
}

// ---------------- NFC ----------------

async function iniciarNFC(){
  if(!('NDEFReader' in window)) return;

  try{
    nfcReader=new NDEFReader();
    await nfcReader.scan();

    nfcReader.onreading = event=>{
      let texto="";
      for(const record of event.message.records){
        texto+=new TextDecoder().decode(record.data);
      }
      document.getElementById("msg").innerText=texto;
      falar(texto);
    };

  }catch(e){}
}

// ---------------- RENDER ----------------

function render(){

if(estado==="inicio"){
  app.innerHTML=`
    <h2>⚙️ Configuração</h2>

    <div class="switch-container">
      <span>🔊 Leitura em Voz</span>
      <label class="switch">
        <input type="checkbox" ${vozAtiva?"checked":""}
        onchange="toggleVoz(this.checked)">
        <span class="slider"></span>
      </label>
    </div>

    <p>Tempo: ${tempoTotal/60000} min</p>
    <input type="range" min="1" max="20"
      value="${tempoTotal/60000}"
      onchange="setTempo(this.value)">

    <button class="planejamento" onclick="irPlanejamento()">Iniciar</button>
  `;
}

else if(["planejamento","monitoramento","avaliacao"].includes(estado)){
  telaCard();
}

else if(estado==="reflexao"){
  app.innerHTML=`
    <h2>🧠 Reflexão</h2>
    <div class="card reflexao">
      Pense sobre seu desempenho antes de ver o resultado.
    </div>
    <button onclick="mostrarFeedback()">Ver análise</button>
  `;
}

else if(estado==="feedback"){
  let f=gerarFeedback();

  app.innerHTML=`
    <h2>📊 Resultado Metacognitivo</h2>

    <div class="feedback">
      <h3>${f.titulo}</h3>

      <p><b>📊 Interpretação:</b><br>${f.interpretacao}</p>

      <p><b>🎯 Significado:</b><br>${f.significado}</p>

      <p><b>🔁 Direcionamento:</b><br>${f.direcionamento}</p>
    </div>

    <button onclick="reiniciar()">Novo ciclo</button>
  `;

  falar(f.titulo);
}

}

// ---------------- CONFIG ----------------

function toggleVoz(v){
  vozAtiva=v;
  localStorage.setItem("voz",v);
}

function setTempo(v){
  tempoTotal=v*60000;
  localStorage.setItem("tempo",tempoTotal);
}

// ---------------- FLUXO ----------------

function irPlanejamento(){
  estado="planejamento";
  render();
}

// ---------------- CARD ----------------

function telaCard(){

  podeIniciarTimer=true;

  app.innerHTML=`
    <h2>${estado.toUpperCase()}</h2>

    <div class="progress">
      <div class="bar" id="barra"></div>
    </div>

    <div class="card ${estado}" onclick="iniciarCard()">
      <p id="msg">Aproxime NFC ou leia QR</p>
    </div>

    <button onclick="scanQR()">📷 QR Code</button>
    <div id="reader"></div>

    ${estado==="monitoramento"?`
      <button onclick="responder('ok')">✔ Satisfatório</button>
      <button onclick="responder('ruim')">❌ Insatisfatório</button>
    `:""}

    ${estado==="avaliacao"?`
      <button onclick="avaliar('sim')">✔ Atingiu</button>
      <button onclick="avaliar('nao')">❌ Não</button>
    `:""}

    <button onclick="proximo()">➡️ Próximo</button>
  `;

  setTimeout(iniciarNFC,500);
}

// ---------------- TIMER ----------------

function iniciarCard(){
  if(!podeIniciarTimer) return;
  iniciarTimer();
  podeIniciarTimer=false;
}

function iniciarTimer(){
  tempoAtual=0;
  clearInterval(intervalo);

  intervalo=setInterval(()=>{
    tempoAtual+=100;
    let p=(tempoAtual/tempoTotal)*100;
    document.getElementById("barra").style.width=p+"%";

    if(tempoAtual>=tempoTotal){
      clearInterval(intervalo);
    }
  },100);
}

// ---------------- AÇÕES ----------------

function responder(r){
  score.monitoramento=r;
}

function avaliar(r){
  score.avaliacao=r;
}

function proximo(){

  clearInterval(intervalo);

  if(nfcReader){
    try{ nfcReader.onreading=null }catch(e){}
  }

  if(estado==="planejamento") estado="monitoramento";
  else if(estado==="monitoramento") estado="avaliacao";
  else if(estado==="avaliacao") estado="reflexao";

  render();
}

// ---------------- FEEDBACK ----------------

function mostrarFeedback(){
  estado="feedback";
  render();
}

function gerarFeedback(){

  if(score.monitoramento==="ok" && score.avaliacao==="sim"){
    return {
      titulo:"🧠 Calibração adequada",
      interpretacao:"Seu julgamento foi coerente com o resultado.",
      significado:"Alta acurácia metacognitiva.",
      direcionamento:"Aprofunde seu conhecimento."
    };
  }

  if(score.monitoramento==="ok" && score.avaliacao==="nao"){
    return {
      titulo:"🧠 Superestimação do desempenho",
      interpretacao:"Você achou que sabia, mas não atingiu o objetivo.",
      significado:"Viés otimista.",
      direcionamento:"Reveja o conteúdo com mais profundidade."
    };
  }

  if(score.monitoramento==="ruim" && score.avaliacao==="sim"){
    return {
      titulo:"🧠 Subestimação do desempenho",
      interpretacao:"Você sabia mais do que pensava.",
      significado:"Viés pessimista.",
      direcionamento:"Confie mais no seu aprendizado."
    };
  }

  return {
    titulo:"🧠 Calibração adequada negativa",
    interpretacao:"Você identificou corretamente a dificuldade.",
    significado:"Consciência metacognitiva.",
    direcionamento:"Ajuste sua estratégia de estudo."
  };
}

// ---------------- QR ----------------

function scanQR(){

  const qr=new Html5Qrcode("reader");

  qr.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    txt=>{
      document.getElementById("msg").innerText=txt;
      falar(txt);
      qr.stop();
    }
  );
}

// ---------------- RESET ----------------

function reiniciar(){
  estado="inicio";
  score={monitoramento:"",avaliacao:""};
  render();
}

// ---------------- START ----------------

render();

</script>

</body>
</html>
