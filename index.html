<!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MetaCog</title>

<link rel="manifest" href="manifest.json">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --fontSize: 18px; }

body {
  margin:0;
  font-family: Arial;
  font-size: var(--fontSize);
  background:#fdfdfd;
  color:#030011;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container { width:100%; max-width:420px; text-align:center; }

.card {
  width:70%;
  margin:auto;
  padding:30px;
  border-radius:20px;
  min-height:300px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

button {
  width:80%;
  padding:15px;
  margin:10px auto;
  display:block;
  border:none;
  border-radius:10px;
  font-weight:bold;
  color:white;
  background:#3287f2;
}

.switch-container {
  width:80%;
  margin:15px auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#ffffff22;
  padding:2px;
  border-radius:12px;
}

.switch {
  position: relative;
  width: 50px;
  height: 26px;
}

.switch input { opacity: 0; }

.slider {
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background:#ccc;
  border-radius:34px;
}

.slider:before {
  content:"";
  position:absolute;
  height:18px;
  width:18px;
  left:4px;
  bottom:4px;
  background:white;
  border-radius:50%;
  transition:.3s;
}

input:checked + .slider {
  background:#00c853;
}

input:checked + .slider:before {
  transform:translateX(24px);
}

.planejamento { background:#3287f2; }
.estude { background:#7ED321; }
.monitoramento { background:#fa62cc; }
.avaliacao { background:#ff7a41; }
.reflexao { background:#7ED321; }

.progress {
  width:80%;
  height:6px;
  background:#ccc;
  margin:10px auto;
  border-radius:5px;
}

.bar { height:100%; width:0%; background:#7ED321; }

#reader { width:300px; margin:10px auto; }
</style>
</head>

<body>

<div class="container">
  <div id="app"></div>
</div>

<!-- VLibras -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>

// ---------------- ESTADO ----------------

let estado = "inicio";

let tempoTotal = parseInt(localStorage.getItem("tempo")) || (5 * 60000);
let vozAtiva = localStorage.getItem("voz") === "true";

// ✅ NFC NOVO
let nfcAtivo = localStorage.getItem("nfc") === "true";
let nfcController = null;

let tempoAtual = 0;
let intervalo;

let score = { monitoramento:"", avaliacao:"" };
let podeIniciarTimer = false;

// ---------------- CARTAS -----------------
const FRASES = { /* (mantido igual) */ };

// ---------------- VLibras ----------------
new window.VLibras.Widget('https://vlibras.gov.br/app');

// ---------------- VOZ ----------------
function falar(txt){
  if(!vozAtiva) return;
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(txt));
}

// ---------------- NFC ----------------

async function iniciarNFC(){

  if(!nfcAtivo || !('NDEFReader' in window)) return;

  try {
    nfcController = new AbortController();
    const ndef = new NDEFReader();

    await ndef.scan({ signal: nfcController.signal });

    ndef.onreading = event => {

      let texto = "";

      for (const record of event.message.records) {
        texto = new TextDecoder().decode(record.data);
      }

      const codigo = texto.toUpperCase().trim();
      const grupo = obterGrupo(codigo);
      const frase = obterFrase(codigo);

      let mensagem;

      if (!grupo || !frase) {
        mensagem = "NFC inválido.";
      } 
      else if (grupo !== estado.toLowerCase()) {
        mensagem = `Atenção! Esta carta não pertence à etapa de ${estado.toUpperCase()}.`;
      } 
      else {
        mensagem = frase;
      }

      document.getElementById("msg").innerText = mensagem;

      // ✅ Vibração
      if(navigator.vibrate) navigator.vibrate(200);

      // ✅ Feedback visual
      document.querySelector(".card").style.border = "3px solid #00c853";

      falar(mensagem);
    };

  } catch (err) {
    console.log("Erro NFC:", err);
  }
}

// ---------------- RENDER ----------------

function render(){

if(estado==="inicio"){
  app.innerHTML = `
    <h2>⚙️ CONFIGURAÇÃO</h2>

    <div class="switch-container">
      <span>🔊 Leitura em Voz</span>
      <label class="switch">
        <input type="checkbox" ${vozAtiva ? "checked":""}
          onchange="toggleVoz(this.checked)">
        <span class="slider"></span>
      </label>
    </div>

    <!-- ✅ NFC SWITCH -->
    <div class="switch-container">
      <span>📡 NFC automático</span>
      <label class="switch">
        <input type="checkbox" ${nfcAtivo ? "checked":""}
          onchange="toggleNFC(this.checked)">
        <span class="slider"></span>
      </label>
    </div>

    <div class="switch-container">
    <p>Fonte</p>
        <input type="range" min="14" max="28"
          value="${localStorage.getItem('fonte')||18}"
          onchange="setFonte(this.value)">
    </div>

    <div class="switch-container">
        <p>Tempo: <span id="tempoLabel">${tempoTotal/60000} min</span></p>
        <input type="range" min="0.1" max="20"
          value="${tempoTotal/60000}"
          onchange="setTempo(this.value)">
    </div>

    <button class="planejamento" onclick="irPlanejamento()">➡️ Iniciar</button>
  `;

  falar("Metacogni. Tela de configuração");
  
} else if(["planejamento","monitoramento","avaliacao","estude"].includes(estado)){
  telaCard();
}

else if(estado==="reflexao"){
  let p = gerarPergunta();

  app.innerHTML=`
    <h2>🧠 REFLEXÃO</h2>
    <div class="card reflexao">${p}</div>
    <button onclick="irScore()">➡️ Continuar</button>
  `;

  falar(p);
}

else if(estado==="score"){
  let f = gerarFeedbackCompleto();

  app.innerHTML=`
    <h2>📊 FEEDBACK METACOGNITIVO</h2>
    <div class="card" style="display: block;">
    <h3>${f.titulo}</h3>

    <p><strong>Interpretação:</strong><br>${f.interpretacao}</p>
    <p><strong>Significado metacognitivo:</strong><br>${f.significado}</p>
    <p><strong>Direcionamento:</strong><br>${f.direcionamento}</p>
    </div>

    <button onclick="reiniciar()">🔁 Novo ciclo</button>
  `;

  falar(f.titulo);
}

}

// ---------------- CONFIG ----------------

function toggleVoz(valor){
  vozAtiva = valor;
  localStorage.setItem("voz", vozAtiva);
}

// ✅ NFC toggle
function toggleNFC(valor){
  nfcAtivo = valor;
  localStorage.setItem("nfc", nfcAtivo);
}

function setFonte(v){
  document.documentElement.style.setProperty('--fontSize', v+"px");
  localStorage.setItem("fonte", v);
}

function setTempo(v){
  tempoTotal = v * 60000;
  localStorage.setItem("tempo", tempoTotal);
  document.getElementById("tempoLabel").innerText = v+" min";
}

// ---------------- FLUXO ----------------

function irPlanejamento(){
  estado="planejamento";
  render();
}

// ---------------- CARD ----------------

function telaCard(){

  app.innerHTML=`
    <h2>${estado.toUpperCase()}</h2>

    <div class="card ${estado}">
      <p id="msg">Aproxime a carta NFC ou use QR</p>
    </div>

    <button onclick="scanQR('${estado}')">📷 Ler QR</button>
    <div id="reader"></div>
  `;

  // ✅ Ativa NFC automaticamente
  iniciarNFC();

  falar("Aproxime a carta.");
}

// ---------------- QR ----------------

function obterGrupo(codigo) {
  if (codigo.startsWith("PLANEJ")) return "planejamento";
  if (codigo.startsWith("MONITO")) return "monitoramento";
  if (codigo.startsWith("AVALIA")) return "avaliacao";
  return null;
}

function obterFrase(codigo) {
  return FRASES[codigo] || null;
}

function scanQR(estadoAtual) {
  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      const codigo = decodedText.toUpperCase().trim();
      const grupo = obterGrupo(codigo);
      const frase = obterFrase(codigo);

      let mensagem;

      if (!grupo || !frase) {
        mensagem = "QR Code inválido.";
      } 
      else if (grupo !== estadoAtual.toLowerCase()) {
        mensagem = `Atenção! Esta carta não pertence à etapa de ${estadoAtual.toUpperCase()}.`;
      } 
      else {
        mensagem = frase;
      }

      document.getElementById("msg").innerText = mensagem;
      falar(mensagem);

      html5QrCode.stop();
    }
  );
}

// ---------------- SERVICE WORKER ----------------

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

// ---------------- START ----------------

render();

</script>

</body>
</html>
